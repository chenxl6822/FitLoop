spring:
  application:
    name: fitloop-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fitloop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:fitloop}
    password: ${SPRING_DATASOURCE_PASSWORD:fitloop}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    # The pre-Flyway production schema matches V1. Empty databases still run V1 onward.
    baseline-version: 1
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  mail:
    host: ${FITLOOP_MAIL_HOST:smtp.qq.com}
    port: ${FITLOOP_MAIL_PORT:465}
    username: ${FITLOOP_MAIL_USERNAME:}
    password: ${FITLOOP_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${FITLOOP_MAIL_SSL_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

fitloop:
  admin:
    bootstrap-account: ${FITLOOP_ADMIN_BOOTSTRAP_ACCOUNT:}
    bootstrap-nickname: ${FITLOOP_ADMIN_BOOTSTRAP_NICKNAME:}
  jwt:
    secret: ${FITLOOP_JWT_SECRET:change-me-to-a-long-random-secret-for-production}
    ttl-seconds: ${FITLOOP_JWT_TTL_SECONDS:900}
    refresh-ttl-seconds: ${FITLOOP_REFRESH_TTL_SECONDS:2592000}
  agent:
    service-key: ${FITLOOP_AGENT_SERVICE_KEY:change-me-agent-service-key-32-bytes}
    delegation-secret: ${FITLOOP_AGENT_DELEGATION_SECRET:${FITLOOP_JWT_SECRET:change-me-to-a-long-random-secret-for-production}}
    delegation-ttl-seconds: ${FITLOOP_AGENT_DELEGATION_TTL_SECONDS:300}
    stream-key: ${FITLOOP_AGENT_STREAM_KEY:fitloop:agent:runs}
  upload:
    path: ${FITLOOP_UPLOAD_PATH:./uploads}
  mail:
    from: ${FITLOOP_MAIL_FROM:${FITLOOP_MAIL_USERNAME:}}
  sms:
    enabled: ${FITLOOP_SMS_ENABLED:false}
  verification:
    hash-secret: ${FITLOOP_OTP_HASH_SECRET:${FITLOOP_JWT_SECRET:change-me-to-a-long-random-secret-for-production}}
    debug-return: ${FITLOOP_OTP_DEBUG_RETURN:false}
