spring:
  application:
    name: fitloop-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fitloop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:fitloop}
    password: ${SPRING_DATASOURCE_PASSWORD:fitloop}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  mail:
    host: ${FITLOOP_MAIL_HOST:smtp.qq.com}
    port: ${FITLOOP_MAIL_PORT:465}
    username: ${FITLOOP_MAIL_USERNAME:}
    password: ${FITLOOP_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${FITLOOP_MAIL_SSL_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

fitloop:
  jwt:
    secret: ${FITLOOP_JWT_SECRET:change-me-to-a-long-random-secret-for-production}
    ttl-seconds: ${FITLOOP_JWT_TTL_SECONDS:604800}
  admin:
    key: ${FITLOOP_ADMIN_KEY:change-me-admin-key}
  upload:
    path: ${FITLOOP_UPLOAD_PATH:./uploads}
  mail:
    from: ${FITLOOP_MAIL_FROM:${FITLOOP_MAIL_USERNAME:}}
  verification:
    hash-secret: ${FITLOOP_OTP_HASH_SECRET:${FITLOOP_JWT_SECRET:change-me-to-a-long-random-secret-for-production}}
    debug-return: ${FITLOOP_OTP_DEBUG_RETURN:false}
