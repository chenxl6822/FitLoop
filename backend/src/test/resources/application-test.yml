spring:
  datasource:
    url: jdbc:h2:mem:fitloop;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    username: test@example.com
    password: test-password
management:
  health:
    mail:
      enabled: false

fitloop:
  jwt:
    secret: test-secret-test-secret-test-secret
    ttl-seconds: 3600
  agent:
    service-key: test-agent-service-key-32-bytes-ok
    delegation-secret: test-agent-delegation-secret-32-bytes
  verification:
    hash-secret: test-otp-hash-secret
    debug-return: true
  mail:
    from: test@example.com
