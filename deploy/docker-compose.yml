services:
  mysql:
    image: mysql:8.0
    container_name: fitloop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fitloop}
      MYSQL_USER: ${MYSQL_USER:-fitloop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fitloop-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:6.2-alpine
    container_name: fitloop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: fitloop-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-fitloop}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-fitloop}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      FITLOOP_JWT_SECRET: ${FITLOOP_JWT_SECRET:-replace-with-a-long-random-production-secret}
      FITLOOP_ADMIN_KEY: ${FITLOOP_ADMIN_KEY:-replace-with-an-admin-review-key}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: fitloop-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./download.html:/usr/share/nginx/html/download.html:ro
      - ./apk:/usr/share/nginx/html/apk:ro

volumes:
  mysql-data:
