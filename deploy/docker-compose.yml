services:
  mysql:
    image: mysql:8.0
    container_name: fitloop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fitloop}
      MYSQL_USER: ${MYSQL_USER:-fitloop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fitloop-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  redis:
    image: redis:6.2-alpine
    container_name: fitloop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    container_name: fitloop-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-fitloop}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-fitloop}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      FITLOOP_JWT_SECRET: ${FITLOOP_JWT_SECRET:-replace-with-a-long-random-production-secret}
      FITLOOP_ADMIN_KEY: ${FITLOOP_ADMIN_KEY:-replace-with-an-admin-review-key}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: fitloop-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
