services:
  mysql:
    image: mysql:8.0
    container_name: fitloop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fitloop}
      MYSQL_USER: ${MYSQL_USER:-fitloop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fitloop-root}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:6.2-alpine
    container_name: fitloop-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: fitloop-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-fitloop}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-fitloop}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      FITLOOP_JWT_SECRET: ${FITLOOP_JWT_SECRET:-replace-with-a-long-random-production-secret}
      FITLOOP_AGENT_SERVICE_KEY: ${FITLOOP_AGENT_SERVICE_KEY:-replace-with-a-random-agent-service-key}
      FITLOOP_AGENT_DELEGATION_SECRET: ${FITLOOP_AGENT_DELEGATION_SECRET:-replace-with-a-random-agent-delegation-secret}
      FITLOOP_ADMIN_BOOTSTRAP_ACCOUNT: ${FITLOOP_ADMIN_BOOTSTRAP_ACCOUNT:-}
      FITLOOP_ADMIN_BOOTSTRAP_NICKNAME: ${FITLOOP_ADMIN_BOOTSTRAP_NICKNAME:-}
      FITLOOP_OTP_HASH_SECRET: ${FITLOOP_OTP_HASH_SECRET:-replace-with-a-long-random-otp-hash-secret}
      FITLOOP_OTP_DEBUG_RETURN: ${FITLOOP_OTP_DEBUG_RETURN:-false}
      FITLOOP_MAIL_HOST: ${FITLOOP_MAIL_HOST:-smtp.qq.com}
      FITLOOP_MAIL_PORT: ${FITLOOP_MAIL_PORT:-465}
      FITLOOP_MAIL_USERNAME: ${FITLOOP_MAIL_USERNAME:-}
      FITLOOP_MAIL_PASSWORD: ${FITLOOP_MAIL_PASSWORD:-}
      FITLOOP_MAIL_FROM: ${FITLOOP_MAIL_FROM:-}
      FITLOOP_UPLOAD_PATH: /app/uploads
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  agent-service:
    build:
      context: ../agent-service
    container_name: fitloop-agent-service
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_COACH_MODEL: ${DEEPSEEK_COACH_MODEL:-deepseek-v4-flash}
      DEEPSEEK_APPEAL_MODEL: ${DEEPSEEK_APPEAL_MODEL:-deepseek-v4-pro}
      BACKEND_BASE_URL: http://backend:8080
      AGENT_SERVICE_KEY: ${FITLOOP_AGENT_SERVICE_KEY:-}
      AGENT_WORKER_ENABLED: ${FITLOOP_AGENT_ENABLED:-true}
      REDIS_URL: redis://redis:6379/0
      AGENT_STREAM_KEY: ${FITLOOP_AGENT_STREAM_KEY:-fitloop:agent:runs}
      AGENT_CONSUMER_NAME: ${AGENT_CONSUMER_NAME:-agent-1}
      FLASH_INPUT_USD_PER_MILLION: ${FLASH_INPUT_USD_PER_MILLION:-0.14}
      FLASH_OUTPUT_USD_PER_MILLION: ${FLASH_OUTPUT_USD_PER_MILLION:-0.28}
      PRO_INPUT_USD_PER_MILLION: ${PRO_INPUT_USD_PER_MILLION:-0.435}
      PRO_OUTPUT_USD_PER_MILLION: ${PRO_OUTPUT_USD_PER_MILLION:-0.87}
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/ready')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: fitloop-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./download.html:/usr/share/nginx/html/download.html:ro
      - ./apk:/usr/share/nginx/html/apk:ro


volumes:
  mysql-data:
  uploads_data:
