server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $backend_origin http://backend:8080;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location = / {
        try_files /download.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /download {
        try_files /download.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /download.html {
        try_files /download.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /apk/version.json {
        alias /usr/share/nginx/html/apk/version.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /apk/app-release.apk {
        alias /usr/share/nginx/html/apk/app-release.apk;
        etag on;
        add_header Cache-Control "no-cache" always;
    }

    location /apk/ {
        alias /usr/share/nginx/html/apk/;
    }

    location /api/ {
        proxy_pass $backend_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass $backend_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /actuator/health {
        proxy_pass $backend_origin;
    }
}
