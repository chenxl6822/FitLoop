# FitLoop — Nginx SSL 配置
# 使用方法:
#   1. 先在服务器安装 certbot:
#      apt install -y certbot python3-certbot-nginx
#   2. 运行这个配置前先申请证书:
#      certbot --nginx -d your-domain.cn
#   3. 将本文件复制为 /etc/nginx/conf.d/fitloop.conf
#
# ⚠️ 如果用 Docker 部署后端，需要调整 proxy_pass 到 localhost
#    因为 Docker 容器和 Nginx 不在同一个网络命名空间

upstream fitloop_backend {
    server localhost:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # 健康检查不跳转 HTTPS
    location = /actuator/health {
        proxy_pass http://fitloop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 其他 HTTP → HTTPS 重定向
    # domain 配置后取消注释以下行，替换为你的域名
    # server_name your-domain.cn;
    # return 301 https://$host$request_uri;

    # 临时默认：直接代理
    location / {
        proxy_pass http://fitloop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

