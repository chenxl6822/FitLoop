services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ${FITLOOP_TLS_CERT_FILE:?FITLOOP_TLS_CERT_FILE is required}:/etc/nginx/tls/fullchain.pem:ro
      - ${FITLOOP_TLS_KEY_FILE:?FITLOOP_TLS_KEY_FILE is required}:/etc/nginx/tls/privkey.pem:ro
