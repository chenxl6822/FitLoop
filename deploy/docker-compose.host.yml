services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: fitloop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fitloop}
      MYSQL_USER: ${MYSQL_USER:-fitloop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fitloop}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fitloop-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: docker.m.daocloud.io/library/redis:6.2-alpine
    container_name: fitloop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.27-alpine
    container_name: fitloop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.host.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
