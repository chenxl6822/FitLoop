upstream fitloop_backend {
    server backend:8080 max_fails=3 fail_timeout=30s;
}

log_format fitloop '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                   'transport=$server_port request_time=$request_time';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    access_log /dev/stdout fitloop;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    # Keep the legacy API available during the compatibility window. Do not
    # redirect POST requests because old Android clients may not replay them.
    location /api/ {
        proxy_pass http://fitloop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        add_header X-FitLoop-Transport legacy-http always;
    }

    location /uploads/ {
        proxy_pass http://fitloop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator/health {
        proxy_pass http://fitloop_backend;
    }

    location = / {
        try_files /download.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /apk/ {
        alias /usr/share/nginx/html/apk/;
    }

    location / {
        try_files $uri /download.html;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    access_log /dev/stdout fitloop;

    ssl_certificate /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Start with a short policy while the certificate and client migration are
    # observed. Increase only after the HTTPS rollout is proven reversible.
    add_header Strict-Transport-Security "max-age=86400" always;

    location = / {
        try_files /download.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=86400" always;
    }

    location = /download {
        try_files /download.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=86400" always;
    }

    location /apk/ {
        alias /usr/share/nginx/html/apk/;
    }

    location /api/ {
        proxy_pass http://fitloop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://fitloop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=86400" always;
    }

    location /actuator/health {
        proxy_pass http://fitloop_backend;
    }

    location / {
        try_files $uri /download.html;
    }
}
