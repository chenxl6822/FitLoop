name: fitloop
description: Campus sports check-in and health management mobile app.
publish_to: "none"
version: 0.1.4+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  flutter_secure_storage: ^10.3.1
  flutter_local_notifications: ^17.2.4
  geolocator: ^13.0.0
  http: ^1.2.1
  pedometer: ^4.0.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ai_generated/
